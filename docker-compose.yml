version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dairyfarm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dairyfarm@2025
      MYSQL_DATABASE: dairyfarm
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - dairyfarm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdairyfarm@2025"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: dairyfarm-backend
    ports:
      - "19465:19465"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dairyfarm
      DB_USERNAME: root
      DB_PASSWORD: dairyfarm@2025
      JWT_SECRET: dairyfarm_milk_quality_control_secret_key_2024
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dairyfarm-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  dairyfarm-network:
    driver: bridge
